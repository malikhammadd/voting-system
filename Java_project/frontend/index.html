<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Voting System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-vote-yea"></i> Online Voting System</h1>
            <p>Cast your vote securely and make your voice heard</p>
            <nav>
                <a href="index.html" class="nav-link active"><i class="fas fa-vote-yea"></i> Vote</a>
                <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-bar"></i> Dashboard</a>
            </nav>
        </header>

        <main>
            <div class="voting-section">
                <div class="voter-info-card">
                    <h2><i class="fas fa-user"></i> Voter Information</h2>
                    <form id="voterForm">
                        <div class="form-group">
                            <label for="voterName"><i class="fas fa-user-circle"></i> Full Name</label>
                            <input type="text" id="voterName" name="voterName" required placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label for="email"><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                        </div>
                        <div class="form-group">
                            <label for="cnic"><i class="fas fa-id-card"></i> CNIC</label>
                            <input type="text" id="cnic" name="cnic" required placeholder="12345-1234567-1">
                        </div>
                        <div class="form-group">
                            <label for="position"><i class="fas fa-briefcase"></i> Position</label>
                            <select id="position" name="position" required>
                                <option value="">Select Position</option>
                                <option value="President">President</option>
                                <option value="Mayor">Mayor</option>
                            </select>
                        </div>
                    </form>
                </div>

                <div class="candidates-section">
                    <h2><i class="fas fa-users"></i> Candidates</h2>
                    <div id="candidatesContainer" class="candidates-grid">
                        <div class="loading">
                            <i class="fas fa-spinner fa-spin"></i> Loading candidates...
                        </div>
                    </div>
                </div>
            </div>

            <div id="message" class="message"></div>
        </main>
    </div>

    <script src="js/voting.js"></script>
</body>
</html>
