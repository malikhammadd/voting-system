<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Dashboard - Results</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-chart-bar"></i> Voting Dashboard</h1>
            <p>Real-time election results and statistics</p>
            <nav>
                <a href="index.html" class="nav-link"><i class="fas fa-vote-yea"></i> Vote</a>
                <a href="dashboard.html" class="nav-link active"><i class="fas fa-chart-bar"></i> Dashboard</a>
            </nav>
        </header>

        <main>
            <div class="stats-cards">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <h3 id="totalVoters">0</h3>
                        <p>Total Voters</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-vote-yea"></i></div>
                    <div class="stat-info">
                        <h3 id="totalVotes">0</h3>
                        <p>Total Votes</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-percentage"></i></div>
                    <div class="stat-info">
                        <h3 id="turnout">0%</h3>
                        <p>Voter Turnout</p>
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <h2><i class="fas fa-filter"></i> Filter Results</h2>
                <select id="positionFilter" class="filter-select">
                    <option value="all">All Positions</option>
                    <option value="President">President</option>
                    <option value="Mayor">Mayor</option>
                </select>
                <button id="refreshBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>

            <div class="results-section">
                <h2><i class="fas fa-poll"></i> Election Results</h2>
                <div id="resultsContainer" class="results-container">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Loading results...
                    </div>
                </div>
            </div>

            <div class="charts-section">
                <div class="chart-container">
                    <canvas id="resultsChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
